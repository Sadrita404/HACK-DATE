<!DOCTYPE html>

<style>
:root {
    --bg: #ffffff;
    --bg-secondary: #f7f6f3;

    --bg-card: #ffffff;

    --cal-selected-text: #ffffff;

    --accent-border: rgba(255,99,105,0.25);
