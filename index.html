<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hack Date</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Plus+Jakarta+Sans:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #ffffff;
    --bg-secondary: #f7f6f3;
    --bg-hover: #efefed;
    --bg-active: #e9e9e7;
    --bg-card: #ffffff;
    --border: rgba(55,53,47,0.09);
    --border-strong: rgba(55,53,47,0.16);
    --text: rgba(55,53,47,1);
    --text-secondary: rgba(55,53,47,0.65);
    --text-muted: rgba(55,53,47,0.4);
    --text-faint: rgba(55,53,47,0.22);
    --accent: #eb5757;
    --accent-bg: rgba(235,87,87,0.07);
    --accent-border: rgba(235,87,87,0.22);
    --blue: #2383e2;
    --blue-bg: rgba(35,131,226,0.07);
    --blue-border: rgba(35,131,226,0.22);
    --cal-selected-bg: rgba(55,53,47,1);
    --cal-selected-text: #ffffff;
    --cal-today-color: #eb5757;
    --cal-day-bg: rgba(55,53,47,0.04);
    --font: 'DM Sans' , monospace;
    --font-mono: 'DM Mono' , monospace;
    --ease: cubic-bezier(0.25,0.46,0.45,0.94);
    --dur: 0.15s;
}    

[data-theme="dark"] {
    --bg: #191919;
    --bg-secondary: #1f1f1f;
    --bg-hover: #2a2a2a;
    --bg-active: #313131;
    --bg-card: #212121;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.13);
    --text: rgba(255,255,255,0.9);
    --text-secondary: rgba(255,255,255,0.6);
    --text-muted: rgba(255,255,255,0.35);
    --text-faint: rgba(255,255,255,0.16);
    --accent: #ff6369;
    --accent-bg: rgba(255,99,105,0.1);
    --accent-border: rgba(255,99,105,0.25);
    --blue: #529cca;
    --blue-bg: rgba(82,156,202,0.1);
    --blue-border: rgba(82,156,202,0.25);
    --cal-selected-bg: rgba(255,255,255,0.9);
    --cal-selected-text: #191919;
    --cal-today-color: #ff6369;
    --cal-day-bg: rgba(255,255,255,0.04)
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: 16px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

body {
    font-family: var(--font);
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.app-root {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background-color: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
}

@media (min-width:481px) {
    .app-root { box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.1); }
}

.hack-flag {
    position: absolute;
    top: 0;
    left: 16px;
    width: 68px;
    z-index: 200;
    pointer-events: auto;
}

.app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--bg);
    border-bottom: 1px solid var(--border);
}

.header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 58px 14px 8px 14px;
}

.page-title-group {
    display: flex;
    align-items: center;
    gap: 7px;
}

.page-icon svg {
    width: 20px;
    height: 20px;
    color: var(--accent);
    stroke-width: 1.8;
}

.page-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 3px;
}

.nbtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    height: 28px;
    padding: 0 8px;
    border: none;
    border-radius: 5px;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color var(--dur) var(--ease), color var(--dur) var(--ease);
    white-space: nowrap;
    text-decoration: none;
    line-height: 1;
}
.nbtn:hover { background-color: var(--bg-hover); color: var(--text); }
.nbtn:active { background-color: var(--bg-active); }
.nbtn:icon-only { width: 28px; padding: 0; }
.nbtn svg { width: 14px; height: 14px; stroke-width: 2; flex-shrink: 0; }
.nbtn.today-btn { color: var(--accent); background-color: var(--accent-bg); font-weight: 600; font-size: 12px; }
.nbtn.today-btn:hover { background-color: var(--accent-border); }
 
.header-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 14px 10px;
}

.month-picker-trigger {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: var(--font);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    transition: background-color var(--dur) var(--ease);
    letter-spacing: -0.2px;
}
.month-picker-trigger:hover { background-color: var(--bg-hover); }
.month-picker-trigger svg { width: 13px; height: 13px; color: var(--text-muted); stroke-width: 2; } 

.nav-group { display: flex; align-items: center; gap: 2px; }

.month-year-picker-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: none;
    align-items: flex-start;
    justify-content: center;
    background-color: rgba(0,0,0,0.3);
    padding-top: 100px;
}
.month-year-picker-overlay.open { display: flex; }

.picker-card {
    background-color: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    overflow: hidden;
    animation: pop-in 0.16s var(--ease) both;
}

@keyframes pop-in {
    from { opacity: 0; transform: scale(0.95) translateY(-6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}

.picker-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
}

.picker-year-nav {
    display: flex;
    align-items: center;
    gap: 8px;
}

.picker-year-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    min-width: 36px;
    text-align: center;
    font-family: var(--font-mono);
}

.picker-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 4px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    transition: background-color var(--dur);
}
.picker-close:hover { background-color: var(--bg-hover); color: var(--text); }
.picker-close svg { width: 14px; height: 14px; stroke-width: 2; }

.picker-months-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    padding: 12px;
}

.picker-month-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 36px;
    border-radius: 6px;
    border: none;
    background: transparent;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background-color var(--dur) var(--ease), color var(--dur) var(--ease); 
}
.picker-month-btn:hover { background-color: var(--bg-hover); color: var(--text); }
.picker-month-btn.active-month {
    background-color: var(--cal-selected-bg);
    color: var(--cal-selected-text);
    font-weight: 600;
}

.calender-section {
    background-color: var(--bg);
    padding: 8px 10px 12px ;
    border-bottom: 1px solid var(--border);
}

.weekday-row {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    margin-bottom: 5px;
}
.weekday-row span {
    display: block;
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.7px;
    padding: 3px 0 5px;
    text-transform: uppercase;
    font-family: var(--font-mono);
}

.days-grid {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    gap: 3px;
}

.day-cell {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    aspect-ratio: 1;
    max-height: 48px;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color var(--dur) var(--ease);
    user-select: none;
    background-color: var(--cal-day-bg);
}
.day-cell:hover { background-color: var(--bg-hover); }
.day-cell:active { background-color: var(--bg-active); }

.day-num {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
}

.day-cell.other-month { opacity: 0.28; pointer-events: none; background-color: transparent; }

.day-cell.today .day-num { color: var(--cal-today-color); font-weight: 700; }
.day-cell.today::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background-color: var(--cal-today-color);
}

.day-cell.selected { background-color: var(--cal-selected-bg) !important; }
.day-cell.selected .day-num { color: var(--cal-selected-text) !important; font-weight: 600; }
.day-cell.selected::after { display: none; }
.day-cell.selected .dot { background-color: rgba(255,255,255,0.45) !important; }
[data-theme="dark"] .dev-cell.selected .dot { background-color: rgba(0,0,0,0.35) !important; }

.dots-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    height: 4px;
}
.dot { width: 3.5px; height: 3.5px; border-radius: 50%; flex-shrink: 0; }
.dot.ama { background-color: var(--blue); }
.dot.regular { background-color: var(--accent); }

.feed-area {
    flex: 1;
    overflow-y: auto;
    background-color: var(--bg-secondary);
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
}
.feed-area::-webkit-scrollbar { width: 4px; }
.feed-area::-webkit-scrollbar-track { background: transparent; }
.feed-area::-webkit-scrollbar-thumb { background-color: var(--border-strong); border-radius: 4px; }

.feed-header-block {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 14px 16px 10px;
    background-color: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
}

</style>
</head>    
</html>
