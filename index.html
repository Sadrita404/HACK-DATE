<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hack Date</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Plus+Jakarta+Sans:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #ffffff;
    --bg-secondary: #f7f6f3;
    --bg-hover: #efefed;
    --bg-active: #e9e9e7;
    --bg-card: #ffffff;
    --border: rgba(55,53,47,0.09);
    --border-strong: rgba(55,53,47,0.16);
    --text: rgba(55,53,47,1);
    --text-secondary: rgba(55,53,47,0.65);
    --text-muted: rgba(55,53,47,0.4);
    --text-faint: rgba(55,53,47,0.22);
    --accent: #eb5757;
    --accent-bg: rgba(235,87,87,0.07);
    --accent-border: rgba(235,87,87,0.22);
    --blue: #2383e2;
    --blue-bg: rgba(35,131,226,0.07);
    --blue-border: rgba(35,131,226,0.22);
    --cal-selected-bg: rgba(55,53,47,1);
    --cal-selected-text: #ffffff;
    --cal-today-color: #eb5757;
    --cal-day-bg: rgba(55,53,47,0.04);
    --font: 'DM Sans' , monospace;
    --font-mono: 'DM Mono' , monospace;
    --ease: cubic-bezier(0.25,0.46,0.45,0.94);
    --dur: 0.15s;
}    

[data-theme="dark"] {
    --bg: #191919;
    --bg-secondary: #1f1f1f;
    --bg-hover: #2a2a2a;
    --bg-active: #313131;
    --bg-card: #212121;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.13);
    --text: rgba(255,255,255,0.9);
    --text-secondary: rgba(255,255,255,0.6);
    --text-muted: rgba(255,255,255,0.35);
    --text-faint: rgba(255,255,255,0.16);
    --accent: #ff6369;
    --accent-bg: rgba(255,99,105,0.1);
    --accent-border: rgba(255,99,105,0.25);
    --blue: #529cca;
    --blue-bg: rgba(82,156,202,0.1);
    --blue-border: rgba(82,156,202,0.25);
    --cal-selected-bg: rgba(255,255,255,0.9);
    --cal-selected-text: #191919;
    --cal-today-color: #ff6369;
    --cal-day-bg: rgba(255,255,255,0.04)
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: 16px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

body {
    font-family: var(--font);
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.app-root {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background-color: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
}

@media (min-width:481px) {
    .app-root { box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.1); }
}

.hack-flag {
    position: absolute;
    top: 0;
    left: 16px;
    width: 68px;
    z-index: 200;
    pointer-events: auto;
}

.app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--bg);
    border-bottom: 1px solid var(--border);
}

.header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 58px 14px 8px 14px;
}

</style>
</head>    
</html>
