<!DOCTYPE html>
< lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hack Date</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Plus+Jakarta+Sans:ital,wght@0,700;1,700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        --bg: #ffffff;
        --bg-secondary: #f7f6f3;
        --bg-hover: #efefed;
        --bg-active: #e9e9e7;
        --bg-card: #ffffff;
        --border: rgba(55, 53, 47, 0.09);
        --border-strong: rgba(55, 53, 47, 0.16);
        --text: rgba(55, 53, 47, 1);
        --text-secondary: rgba(55, 53, 47, 0.65);
        --text-muted: rgba(55, 53, 47, 0.4);
        --text-faint: rgba(55, 53, 47, 0.22);
        --accent: #eb5757;
        --accent-bg: rgba(235, 87, 87, 0.07);
        --accent-border: rgba(235, 87, 87, 0.22);
        --blue: #2383e2;
        --blue-bg: rgba(35, 131, 226, 0.07);
        --blue-border: rgba(35, 131, 226, 0.22);
        --cal-selected-bg: rgba(55, 53, 47, 1);
        --cal-selected-text: #ffffff;
        --cal-today-color: #eb5757;
        --cal-day-bg: rgba(55, 53, 47, 0.04);
        --font: "DM Sans", monospace;
        --font-mono: "DM Mono", monospace;
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --dur: 0.15s;
      }

      [data-theme="dark"] {
        --bg: #191919;
        --bg-secondary: #1f1f1f;
        --bg-hover: #2a2a2a;
        --bg-active: #313131;
        --bg-card: #212121;
        --border: rgba(255, 255, 255, 0.07);
        --border-strong: rgba(255, 255, 255, 0.13);
        --text: rgba(255, 255, 255, 0.9);
        --text-secondary: rgba(255, 255, 255, 0.6);
        --text-muted: rgba(255, 255, 255, 0.35);
        --text-faint: rgba(255, 255, 255, 0.16);
        --accent: #ff6369;
        --accent-bg: rgba(255, 99, 105, 0.1);
        --accent-border: rgba(255, 99, 105, 0.25);
        --blue: #529cca;
        --blue-bg: rgba(82, 156, 202, 0.1);
        --blue-border: rgba(82, 156, 202, 0.25);
        --cal-selected-bg: rgba(255, 255, 255, 0.9);
        --cal-selected-text: #191919;
        --cal-today-color: #ff6369;
        --cal-day-bg: rgba(255, 255, 255, 0.04);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font);
        background: var(--bg-secondary);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .app-root {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background-color: var(--bg);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      @media (min-width: 481px) {
        .app-root {
          box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0, 0, 0, 0.1);
        }
      }

      .hack-flag {
        position: absolute;
        top: 0;
        left: 16px;
        width: 68px;
        z-index: 200;
        pointer-events: auto;
      }

      .app-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background-color: var(--bg);
        border-bottom: 1px solid var(--border);
      }

      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 58px 14px 8px 14px;
      }

      .page-title-group {
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .page-icon svg {
        width: 20px;
        height: 20px;
        color: var(--accent);
        stroke-width: 1.8;
      }

      .page-title {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: var(--text);
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .nbtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        height: 28px;
        padding: 0 8px;
        border: none;
        border-radius: 5px;
        background: transparent;
        color: var(--text-secondary);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color var(--dur) var(--ease),
          color var(--dur) var(--ease);
        white-space: nowrap;
        text-decoration: none;
        line-height: 1;
      }
      .nbtn:hover {
        background-color: var(--bg-hover);
        color: var(--text);
      }
      .nbtn:active {
        background-color: var(--bg-active);
      }
      .nbtn:icon-only {
        width: 28px;
        padding: 0;
      }
      .nbtn svg {
        width: 14px;
        height: 14px;
        stroke-width: 2;
        flex-shrink: 0;
      }
      .nbtn.today-btn {
        color: var(--accent);
        background-color: var(--accent-bg);
        font-weight: 600;
        font-size: 12px;
      }
      .nbtn.today-btn:hover {
        background-color: var(--accent-border);
      }

      .header-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 14px 10px;
      }

      .month-picker-trigger {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 8px;
        border-radius: 5px;
        cursor: pointer;
        border: none;
        background: transparent;
        font-family: var(--font);
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
        transition: background-color var(--dur) var(--ease);
        letter-spacing: -0.2px;
      }
      .month-picker-trigger:hover {
        background-color: var(--bg-hover);
      }
      .month-picker-trigger svg {
        width: 13px;
        height: 13px;
        color: var(--text-muted);
        stroke-width: 2;
      }

      .nav-group {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .month-year-picker-overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: none;
        align-items: flex-start;
        justify-content: center;
        background-color: rgba(0, 0, 0, 0.3);
        padding-top: 100px;
      }
      .month-year-picker-overlay.open {
        display: flex;
      }

      .picker-card {
        background-color: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        width: 280px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        overflow: hidden;
        animation: pop-in 0.16s var(--ease) both;
      }

      @keyframes pop-in {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(-6px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .picker-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }

      .picker-year-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .picker-year-label {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        min-width: 36px;
        text-align: center;
        font-family: var(--font-mono);
      }

      .picker-close {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 4px;
        border: none;
        background: transparent;
        cursor: pointer;
        color: var(--text-muted);
        transition: background-color var(--dur);
      }
      .picker-close:hover {
        background-color: var(--bg-hover);
        color: var(--text);
      }
      .picker-close svg {
        width: 14px;
        height: 14px;
        stroke-width: 2;
      }

      .picker-months-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        padding: 12px;
      }

      .picker-month-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 36px;
        border-radius: 6px;
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        transition: background-color var(--dur) var(--ease),
          color var(--dur) var(--ease);
      }
      .picker-month-btn:hover {
        background-color: var(--bg-hover);
        color: var(--text);
      }
      .picker-month-btn.active-month {
        background-color: var(--cal-selected-bg);
        color: var(--cal-selected-text);
        font-weight: 600;
      }

      .calender-section {
        background-color: var(--bg);
        padding: 8px 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      .weekday-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        margin-bottom: 5px;
      }
      .weekday-row span {
        display: block;
        text-align: center;
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.7px;
        padding: 3px 0 5px;
        text-transform: uppercase;
        font-family: var(--font-mono);
      }

      .days-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
      }

      .day-cell {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        aspect-ratio: 1;
        max-height: 48px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color var(--dur) var(--ease);
        user-select: none;
        background-color: var(--cal-day-bg);
      }
      .day-cell:hover {
        background-color: var(--bg-hover);
      }
      .day-cell:active {
        background-color: var(--bg-active);
      }

      .day-num {
        font-size: 12.5px;
        font-weight: 500;
        color: var(--text);
        line-height: 1;
      }

      .day-cell.other-month {
        opacity: 0.28;
        pointer-events: none;
        background-color: transparent;
      }

      .day-cell.today .day-num {
        color: var(--cal-today-color);
        font-weight: 700;
      }
      .day-cell.today::after {
        content: "";
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background-color: var(--cal-today-color);
      }

      .day-cell.selected {
        background-color: var(--cal-selected-bg) !important;
      }
      .day-cell.selected .day-num {
        color: var(--cal-selected-text) !important;
        font-weight: 600;
      }
      .day-cell.selected::after {
        display: none;
      }
      .day-cell.selected .dot {
        background-color: rgba(255, 255, 255, 0.45) !important;
      }
      [data-theme="dark"] .dev-cell.selected .dot {
        background-color: rgba(0, 0, 0, 0.35) !important;
      }

      .dots-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
        height: 4px;
      }
      .dot {
        width: 3.5px;
        height: 3.5px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.ama {
        background-color: var(--blue);
      }
      .dot.regular {
        background-color: var(--accent);
      }

      .feed-area {
        flex: 1;
        overflow-y: auto;
        background-color: var(--bg-secondary);
        scrollbar-width: thin;
        scrollbar-color: var(--border-strong) transparent;
      }
      .feed-area::-webkit-scrollbar {
        width: 4px;
      }
      .feed-area::-webkit-scrollbar-track {
        background: transparent;
      }
      .feed-area::-webkit-scrollbar-thumb {
        background-color: var(--border-strong);
        border-radius: 4px;
      }

      .feed-header-block {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 14px 16px 10px;
        background-color: var(--bg);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .feed-date-label {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        font-family: var(--font-mono);
      }

      .event-count-pill {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        background-color: var(--bg-hover);
        padding: 2px 8px;
        border-radius: 20px;
        font-family: var(--font-mono);
      }

      .event-list {
        padding: 12px 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .event-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        transition: border-color var(--dur) var(--ease),
          box-shadow var(--dur) var(--ease);
        animation: card-in 0.18s var(--ease) both;
      }
      @keyframes cars-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .event-card:hover {
        border-color: var(--border-strong);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      }

      .card-inner {
        padding: 14px 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .card-avatar {
        flex-shrink: 0;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        overflow: hidden;
        background-color: var(--bg-hover);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .card-avatar svg {
        width: 16px;
        height: 16px;
        color: var(--text-muted);
        stroke-width: 1.6;
      }

      .card-title-col {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .card-event-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.3;
        letter-spacing: -0.1px;
      }

      .card-leader-row {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
      }

      .card-leader-name {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 400;
      }

      .card-sep-dot {
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background-color: var(--text-faint);
        flex-shrink: 0;
      }

      .card-time-chip {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text-secondary);
        background-color: var(--bg-secondary);
        border: 1px solid var(--border);
        padding: 2px 6px;
        border-radius: 4px;
      }
      .card-time-chip svg {
        width: 10px;
        height: 10px;
        stroke-width: 2;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .card-desc {
        font-size: 12.5px;
        line-height: 1.65;
        color: var(--text-secondary);
        font-weight: 400;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .card-tags-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px;
      }

      .ptag {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 10.5px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 4px;
        border: 1px solid transparent;
        font-family: var(--font-mono);
        letter-spacing: 0.1px;
        text-transform: uppercase;
      }
      .ptag.ama {
        background-color: var(--blue-bg);
        color: var(--blue);
        border-color: var(--blue-border);
      }
      .ptag.ev {
        background-color: var(--accent-bg);
        color: var(--accent);
        border-color: var(--accent-border);
      }

      .card-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      .cta-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        height: 30px;
        padding: 0 11px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text-secondary);
        font-family: var(--font);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: background-color var(--dur) var(--ease),
          border-color var(--dur) var(--ease), color var(--dur) var(--ease); 
        white-space: nowrap;  
      }
      .cta-btn:hover {
        background-color: var(--bg-hover);
        border-color: var(--border-strong);
        color: var(--text);
      }
      .cta-btn svg {
        width: 12px;
        height: 12px;
        stroke-width: 2;
        flex-shrink: 0;
      }
      .cta-btn.primary {
        background-color: var(--cal-selected-bg);
        color: var(--cal-selected-text);
        border-color: transparent;
        font-weight: 600;
      }
      .cta-btn.primary:hover {
        opacity: 0.82;
      }

      .today-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 12px;
        background-color: var(--accent-bg);
        border-left: 3px solid var(--accent);
        border-radius: 0 6px 6px 0;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--accent);
        font-family: var(--font-mono);
        margin: 2px 0 4px;
      }
      .today-bar svg {
        width: 12px;
        height: 12px;
        stroke-width: 2.5;
        flex-shrink: 0;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 56px 24px;
        text-align: center;
        gap: 6px;
      }
      .empty-icon {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        background-color: var(--bg-hover);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
      }
      .empty-icon svg {
        width: 22px;
        height: 22px;
        color: var(--text-muted);
        stroke-width: 1.5;
      }
      .empty-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
      }
      .empty-body {
        font-size: 12.5px;
        color: var(--text-muted);
        line-height: 1.55;
        max-width: 220px;
      }

      .loading-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        gap: 12px;
      }
      .loader-dots {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .ldot {
        width: 5px;
        height: 5px;
        border: 50%;
        background-color: var(--text-muted);
        animation: ldot-bounce 1.1s ease-in-out infinite;
      }
      .ldot:nth-child(2) {
        animation-delay: 0.14s;
      }
      .ldot:nth-child(3) {
        animation-delay: 0.28s;
      }
      @keyframes ldot-bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        30% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
      .loading-text {
        font-size: 12px;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      .app-footer {
        background-color: var(--bg);
        border-top: 1px solid var(--border);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .footer-text {
        font-size: 10.5px;
        color: var(--text-faint);
        font-family: var(--font-mono);
        letter-spacing: 0.2px;
      }
      .footer-heart {
        color: var(--accent);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="app-root">
      <a href="https://hackclub.com/" target="_blank" style="display: block;">
        <img
          class="hack-flag"
          src="https://assets.hackclub.com/flag-orpheus-top.svg"
          alt="Hack Club" />
      </a>

      <header class="app-header">
        <div class="header-top">
          <div class="page-title-group">
            <div class="page-icon">
              <svg 
                xmlns="https://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" />

    <script>
      let pivotDate = new Date();
      let selectedDate = new Date();
      let allEvents = [];
      let eventsMap = {};
      let pickerYear = new Date().getFullYear();

      const API = "https://events.hackclub.com/api/events/all/";
      const MONTHS_LONG = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
        ];
        const MONTHS_LONG = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
          ];
          const WEEKDAYS_LONG = [
            "Sunday",
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            ];

            function zeroPad(n) {
              return String(n).padStart(2, "0");
            }
            function dateKey(d) {
              return `${d.getFullYear()}-${zeroPad(d.getMonth() + 1)}-${zeroPad(
                d.getDate()
                )}`;
            }

            function formatTime(iso) {
              if (!iso || !iso.includes("T")) return "Time TBD";
              const t = iso.split("T")[1];
              if (!t) return "Time TBD";
              const [hh, mm] = t.split(":");
              const h = parseInt(hh, 10);
              return `${h % 12 || 12}:${mm} ${h >=12 ? "PM" : "AM"} UTC`;
            }

            function formatHeading(d) {
              const tk = dateKey(new Date());
              const sk = dateKey(d);
              const prefix = sk === tk ? "Today \u2014 " : "";
              return `${prefix}${WEEKDAYS_LONG[d.getDay()]}, ${
              MONTHS_LONG[d.getMonth()]
              } ${d.getDate()}, ${d.getFullYear()}`;
            }

            function cleanDesc(text) {
              if (!text) return "";
              return text
                .replace(/\[([^\]]+)\([^)]+\)/g, "$1")
                .replace(/!\[([^]]*\([^])+\))/g, "")
                .replace(/\*\*([^*]+)\*\*/g, "$1")
                .replace(/\*[^*]+)\*/g, "$1")
                .replace(/`([^`]+)`/g, "$1")
                .replace(/#+\s/g, "")
                .replace(/\n{3,}/g, "\n\n")
                .trim();
            }

            function initTheme() {
              const saved = localStorage.getItem("hackdate_theme") || "light";
              applyTheme(saved);
            }
            
            function applyTheme(theme) {
              document.documentElement.setAttribute("data-theme", theme);
              document.getElementById("iconSun").style.display =
                theme === "dark" ? "block" : "none";
              document.getElementById("iconMoon").style.display =
                theme === "dark" ? "none" : "block"
            }

            function toggleTheme() {
              const cur = document.documentElement.getAttribute("data-theme");
              const next = cur === "dark" ? "light" : "dark";
              localStorage.setItem("hackdate_theme", next);
              applyTheme(next);
            }

            function shiftMonth(dir) {
              pivotDate = new Date(
                pivotDate.getFullYear(),
                pivotDate.getMonth() + dir,
                1
              );
              renderGrid();
            }

            function goToday() {
              pivotDate = new Date();
              selectedDate = new Date();
              renderAll();
            }

            function openPicker() {
              pickerYear = pivotDate.getFullYear();
              renderPickerMonths();
              document.getElementById("pickerOverlay").classList.add("open");
            }

            function closePicker() {
              document.getElementById("pickerOverlay").classList.remove("open");
            }

            function renderPickerMonths() {
              document.getElementById("pickerYearLabel").textContent = pickerYear;
              const grid = document.getElementById("pickerMonthsGrid");
              grid.innerHTML = "";
              const activeMo = pivotDate.getMonth();
              const activeYr = pivotDate.getFullYear();
              MONTHS_SHORT.forEach((namee, i) => {
                const btn = document.createElement("button");
                btn.classList.add("picker-month-btn");
                if (pickerYear === activeYr && i === activeMo)
                  btn.classList.add("active-month");
                btn.textContent = name;
                btn.addEventListener("click", () => {
                  pivotDate = new Date(pickerYear, i, 1);
                  renderGrid();
                  closePicker();
                });
                grid.appendChild(btn)  
              });
            }

            async function fetchEvents() {
              try {
                const res = await fetch(API);
                if (!res.ok) throw new Erroe();
                allEvents = await res.json();
                buildMap();
                renderAll();
              } catch (e) {
                showError();
              }
            }

            function buildMap() {
              eventsMap = ();
              allEvents.forEach((ev) => {
                if (!ev.start) return;
                const k = ev.start.split("T")[0];
                if (!eventsMap[k]) eventsMap[k] = [];
                eventsMap[k].puch(ev)
              });
            }

            function renderAll() {
              renderGrid();
              renderFeed();
            }

            function renderGrid() {
              const grid = document.getElementById("daysGrid");
              grid.innerHTML = "";
              const yr = pivotDate.getElementById("daysGrid");
              const mo = pivotDate.getMonth();
              document.getElementById(
                "monthLabel"
              ).textContent = `${MONTHS_LONG[mo]} ${yr}`;
              const firstDow = new Date(yr, mo, 1).getDay();
              const daysInMO = new Date(yr, mo + 1, 0).getDate();
              const prevDays = dateKey(new Date());
              const todayKey = dateKey(new Date());
              const selKey = dateKey(selectedDate);

              for (let i = 0; i < 35; i++) {
                const cell = document.createElement("div");
                cell.classList.add("day-cell");
                let cellDate,
                  dayNum,
                  isCurrent = false;

                if (i < firstDow) {
                  dayNum = prevDays - (firstDow - i - 1);
                  cell.classList.add("other-months");
                  cellDate = mew Date(yr, mo - 1, dayNum);
                } else if (i - firstDow >= daysInMO) {
                  dayNum = i - firstDow - daysInMO + 1;
                  cell.classList.add("other-month");
                  cellDate = new Date (yr, mo, dayNum);
                } else if {
                  dayNum = i - firstDow + 1;
                  cellDate = new Date(yr, mo, dayNum);
                  isCurrent = true;
                  const k = dateKey(cellDate);
                  if (k === todayKey) cell.classList.add("today");
                  if (k === selKey) cell.classList.add(selected);
                }

                const span = document.createElement("span");
                span.classList.add("day-num");
                span.textContent = dayNum;
                cell.appendChild(span);

                if (isCurrent) {
                  const k = dateKey(cellDate);
                  const dayEvs = eventsMap[k];
                  if (dayEvs && dayEvs.length > 0) {
                    const dr = document.createElement("div");
                    dr.classList.add("dots-row");
                    dayEvs.slice(0, 3).forEach((ev) => {
                      const d = document.createElement("div");
                      d.classList.add("dot", ev.ama ? "ama" : "regular");
                      dr.appendChild(d);
                    });
                    cell.appendChild(dr);
                  }
                  const cap = new Date(cellDate);
                  cell.addEventListener("click", () => {
                    selectedDate = cap;
                    renderAll();
                  });
                }

                grid.appendChild(cell);
              }
            }

            function renderFeed() {
              const list = document.getElementById("eventsList");
              const lbl = document.getElementById("feedDateLabel");
              const pill = document.getElementById("eventCountPill");
              lbl.textContent = formatHeading(selectedDate);
              const k = dateKey(selectedDate);
              const evs = eventsMap[k] || [];

              if (evs.length > 0) {
                pill.style.display ="block";
                pill.textContent = `${evs.lenght} events${
                evs.length !== 1 ? "s" : ""
                }`;
              } else {
                pill.style.display = "none";
              }

              list.innerHTML = "";
              
            }
          </script>
